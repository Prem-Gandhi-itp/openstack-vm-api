---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openstack-vm-api
  labels:
    app: openstack-vm-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openstack-vm-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: openstack-vm-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: YOUR_REGISTRY/openstack-vm-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: MOCK_OPENSTACK
              value: "false"
            - name: LOG_FORMAT
              value: "json"
            - name: OS_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: openstack-creds
                  key: auth_url
            - name: OS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openstack-creds
                  key: password
            - name: VALID_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: keys
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: openstack-vm-api
spec:
  selector:
    app: openstack-vm-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openstack-vm-api
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: vm-api.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openstack-vm-api
                port:
                  number: 80

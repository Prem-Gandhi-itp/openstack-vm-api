version: "3.9"

services:
  api:
    build:
      context: .
      target: runtime
    container_name: openstack-vm-api
    ports:
      - "8000:8000"
    environment:
      - MOCK_OPENSTACK=true
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - DEBUG=false
      # Uncomment to connect to a real OpenStack:
      # - MOCK_OPENSTACK=false
      # - OS_AUTH_URL=http://keystone:5000/v3
      # - OS_USERNAME=admin
      # - OS_PASSWORD=secret
      # - OS_PROJECT_NAME=admin
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Optional: Redis for rate limiting and caching in production
  # redis:
  #   image: redis:7-alpine
  #   container_name: openstack-vm-redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

networks:
  default:
    name: openstack-vm-net

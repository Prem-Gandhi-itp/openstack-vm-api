name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff (non-blocking)
        run: ruff check app/ tests/ || true

      - name: Format check with black (non-blocking)
        run: black --check app/ tests/ || true

      - name: Run tests
        run: |
          pytest tests/ \
            --tb=short \
            --no-header \
            -q

  docker:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t openstack-vm-api:latest .

      - name: Start container
        run: |
          docker run -d \
            --name test-api \
            -p 8000:8000 \
            -e MOCK_OPENSTACK=true \
            openstack-vm-api:latest

      - name: Wait for startup
        run: sleep 8

      - name: Health check
        run: |
          curl -f http://localhost:8000/health
          echo ""
          echo "Health check passed!"

      - name: Show logs on failure
        if: failure()
        run: docker logs test-api

      - name: Cleanup
        if: always()
        run: docker stop test-api || true